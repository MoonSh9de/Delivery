<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Ресторан</title>
        <link rel="stylesheet" href="styles/style.css">
    </head>
    <body>

        <!--Header-->
        <header class="header">
            <div class="container container--header">
                <div class="logo">
                    <img src="assets/images/other/logo.svg" alt="#logo">
                </div>
                <div class="header__btns">
                    <a href="#" class="btn btn__login--header"><img src="assets/images/other/user.svg" alt=""> Войти</a>
                    <a href="#" class="btn btn__cart--header"> <img src="assets/images/other/cart.svg" alt=""> Корзина</a>
                </div>
            </div>  
        </header>

        <!--main-->
        <main class="main">
            <div class="container">
                <div class="restaraunt__info restaraunt__info--goods">
                    <h1 class="restaraunt__title restaraunt__title--goods">Тануки</h1>
                    <div class="raiting">
                        <img class="star_img" src="assets/images/other/star.svg" alt="">
                        <p class="rank">4.5</p>
                        <p class="price">От<span class="cost">900</span>₽<img class="dot" src="assets/images/other/dot.svg" alt=""><span class="dish">Пицца</span></p>
                    </div>
                </div>

                <div class="goods">
                </div>
            </div>
        </main>

         <!--Footer-->
         <footer class="footer">
            <div class="container container--footer">
                <div class="logo">
                    <img src="assets/images/other/logo.svg" alt="#logo">
                </div>
                <div class="footer_content">
                    <ul class="footer__links">
                        <li><a href="" class="footer__link">Ресторанам</a></li>
                        <li><a href="" class="footer__link">Курьерам</a></li>
                        <li><a href="" class="footer__link">Пресс-центр</a></li>
                        <li><a href="" class="footer__link">Контакты</a></li>
                    </ul>
                    <div class="footer__socials">

                        <a class="footer__social">
                            <img src="assets/images/other/instagram.svg" alt="#instagram">
                        </a>

                        <a class="footer__social">
                            <img src="assets/images/other/facebook.svg" alt="#facebook">
                        </a>

                        <a class="footer__social">
                            <img src="assets/images/other/vk.svg" alt="#VK">
                        </a>
                    </div>
                </div>
            </div>
        </footer>

    </body>
</html>
